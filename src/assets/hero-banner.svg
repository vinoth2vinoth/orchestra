<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050505" />
      <stop offset="50%" stop-color="#111111" />
      <stop offset="100%" stop-color="#1a1a1a" />
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#ef4444" />
    </linearGradient>
    <linearGradient id="subGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="1200" height="400" fill="url(#bgGradient)" />
  
  <g stroke="#ffffff" stroke-width="1" stroke-opacity="0.05">
    <pattern id="gridPattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" />
    </pattern>
    <rect width="1200" height="400" fill="url(#gridPattern)" />
  </g>
  
  <g stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.15">
    <path d="M150,80 L300,240 L450,120 L700,300 L900,150 L1100,280" fill="none" />
    <path d="M150,80 L450,120 L900,150 M300,240 L700,300 L1100,280" fill="none" />
  </g>
  
  <g filter="url(#glow)">
    <circle cx="150" cy="80" r="5" fill="url(#subGradient)" />
    <circle cx="300" cy="240" r="6" fill="url(#subGradient)" />
    <circle cx="450" cy="120" r="8" fill="url(#subGradient)" />
    <circle cx="700" cy="300" r="7" fill="url(#subGradient)" />
    <circle cx="900" cy="150" r="9" fill="url(#subGradient)" />
    <circle cx="1100" cy="280" r="5" fill="url(#subGradient)" />
    <circle cx="600" cy="120" r="10" fill="url(#nodeGradient)" />
  </g>
  
  <g stroke="url(#nodeGradient)" stroke-width="2" stroke-opacity="0.6">
    <line x1="450" y1="120" x2="600" y2="120" />
    <line x1="600" y1="120" x2="900" y2="150" />
    <line x1="700" y1="300" x2="600" y2="120" />
  </g>
  
  <text x="600" y="240" font-family="'Inter', system-ui, sans-serif" font-weight="800" font-size="76" fill="#ffffff" text-anchor="middle" letter-spacing="6">🎻 ORCHESTRA</text>
  <text x="600" y="295" font-family="'Inter', system-ui, sans-serif" font-weight="500" font-size="24" fill="#a1a1aa" text-anchor="middle" letter-spacing="4">ENTERPRISE AI AGENT SWARMS</text>
</svg>
