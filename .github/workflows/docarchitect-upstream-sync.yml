name: Sync DocArchitect Upstream

on:
  workflow_dispatch:
  repository_dispatch:
    types: [docarchitect-updated]
  schedule:
    - cron: '17 3 * * *'

permissions:
  contents: write
  pull-requests: write

jobs:
  update-docarchitect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Orchestra
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Orchestra dependencies
        run: npm ci

      - name: Update DocArchitect submodule
        run: git submodule update --remote doc-architect

      - name: Install DocArchitect dependencies
        run: npm ci
        working-directory: doc-architect

      - name: Verify DocArchitect package
        run: npm run build && npm test
        working-directory: doc-architect

      - name: Verify Orchestra integration
        run: |
          npm run docarchitect:verify
          npm run lint
          npm run build

      - name: Create update pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: automation/update-docarchitect
          title: Update DocArchitect submodule
          commit-message: Update DocArchitect submodule
          body: |
            This PR updates the pinned DocArchitect submodule commit.

            Validation performed:
            - `npm run build` in `doc-architect`
            - `npm test` in `doc-architect`
            - `npm run docarchitect:verify`
            - `npm run lint`
            - `npm run build`
