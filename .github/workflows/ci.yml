name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=low

      - name: Typecheck
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Run Redis durability tests
        run: npm run test:redis
        env:
          ORCHESTRA_STATE_ADAPTER: redis
          REDIS_URL: redis://localhost:6379

      - name: Check examples
        run: npm run examples:check

      - name: Build
        run: npm run build

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: validation-failure-artifacts
          path: |
            npm-debug.log*
            yarn-error.log*
            pnpm-debug.log*
            server_logs.txt
            workspace/**/*.log
          if-no-files-found: ignore
