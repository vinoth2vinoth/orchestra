name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=low

      - name: Typecheck
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Check examples
        run: npm run examples:check

      - name: Build
        run: npm run build

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: validation-failure-artifacts
          path: |
            npm-debug.log*
            yarn-error.log*
            pnpm-debug.log*
            server_logs.txt
            workspace/**/*.log
          if-no-files-found: ignore
