name: Architecture proposal
description: Propose a runtime, storage, security, or integration design change.
title: "[Architecture]: "
labels:
  - architecture
body:
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What architectural problem or scaling limit are you addressing?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Explain the design, affected modules, and migration path.
    validations:
      required: true
  - type: textarea
    id: tradeoffs
    attributes:
      label: Trade-offs
      description: Include performance, reliability, security, and maintenance impact.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation plan
      description: Which tests, benchmarks, or staged rollout steps would prove this is safe?
    validations:
      required: true
